# CI: lint + type-check once, run the test suite across the supported Python range.
#
# The matrix bounds the `requires-python = ">=3.10"` claim: oldest supported (3.10)
# and the pinned development version (3.13). Everything runs through uv against the
# committed uv.lock, so CI resolves exactly what a contributor gets from `uv sync`.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --locked
      - name: ruff (lint + import order)
        run: uv run ruff check src tests
      - name: mypy (type-check src)
        run: uv run mypy

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Run tests on ${{ matrix.python-version }}
        run: uv run --python ${{ matrix.python-version }} --isolated pytest
      - name: End-to-end demo (moto)
        run: uv run --python ${{ matrix.python-version }} --isolated python -m fibersail_edge.cloud --duration-s 10
